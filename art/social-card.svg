<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Laravel Puff">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1120"/>
      <stop offset="1" stop-color="#1B2436"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF6B4A"/>
      <stop offset="1" stop-color="#FF2D20"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FF6B4A" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#FF6B4A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- icon -->
  <g transform="translate(430 92)">
    <circle cx="170" cy="120" r="190" fill="url(#glow)"/>
    <g stroke="url(#warm)" stroke-width="12" stroke-linecap="round" fill="none">
      <path d="M262 78 q26 -18 52 0 t52 0"/>
      <path d="M274 122 q28 -18 56 0 t56 0"/>
      <path d="M262 166 q26 -18 52 0 t52 0"/>
    </g>
    <g fill="#F8FAFC">
      <circle cx="104" cy="124" r="52"/>
      <circle cx="162" cy="98" r="66"/>
      <circle cx="214" cy="130" r="46"/>
      <rect x="60" y="128" width="178" height="56" rx="28"/>
    </g>
  </g>

  <text x="600" y="430" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="92" font-weight="700" letter-spacing="-1">
    <tspan fill="#F8FAFC">Laravel</tspan><tspan dx="30" fill="url(#warm)">Puff</tspan>
  </text>

  <text x="600" y="490" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="30" font-weight="400" fill="#94A3B8">
    On-demand warming for scale-to-zero Laravel apps
  </text>

  <text x="600" y="536" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="24" font-weight="500" fill="#64748B" letter-spacing="0.5">
    No cold start when it counts
  </text>
</svg>
